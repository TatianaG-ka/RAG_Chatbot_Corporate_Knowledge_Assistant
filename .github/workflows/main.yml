name: sync-to-hub
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Force push to HF Space
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git push --force \
            https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/TatianaGol/RAG_Chatbot-Corporate_Knowledge_Assistant \
            main
